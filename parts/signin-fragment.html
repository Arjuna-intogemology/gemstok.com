<div class="auth-box">
   <button type="button" class="close-gate" onclick="closeAuthModal()">
    <span class="close-icon"><i class='bx bx-x'></i></span>
    <span class="close-text">CANCEL</span>
   </button>
    <form id="login-form">
        <div class="input-group">
            <label>IDENTIFIER</label>
            <input type="text" name="username" placeholder="Email or Username" required>
        </div>
        
        <div class="input-group">
            <label>ACCESS KEY</label>
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit" class="auth-btn">AUTHORIZE ACCESS</button>
        
    </form>

    <div class="social-auth">
        <button type="button" class="social-btn google-btn">
            <i class='bx bxl-google'></i>
        </button>
        <button type="button" class="social-btn reddit-btn">
            <i class='bx bxl-reddit'></i>
        </button>
    </div>
 
    <div class="auth-footer">
        <a href="#">Forgot Access Key?</a>
        <span>No account? <a href="register.html">Register GEMSTOK ID</a></span>
    </div>


    
</div>
