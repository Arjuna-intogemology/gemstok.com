<div class="registration-hero">
    <h1>CREATE GEMSTOK ID</h1>
    <p>Initialize your profile for the global gem trade network.</p>
</div>

<div class="registration-card">
    <form id="register-form">
        <div class="form-section">
            <h3><i class='bx bx-user-circle'></i> IDENTITY INITIALIZATION</h3>
            <div class="photo-upload-container">
                <label for="profile-photo" class="photo-placeholder">
                    <i class='bx bx-camera'></i>
                    <span>UPLOAD PHOTO</span>
                </label>
                <input type="file" id="profile-photo" hidden>
            </div>
            <div class="input-group">
                <label>IDENTIFIER</label>
                <input type="text" placeholder="Username" required>
            </div>
        </div>
        <button type="submit" class="auth-btn registration-submit">INITIALIZE</button>
    </form>
</div>
