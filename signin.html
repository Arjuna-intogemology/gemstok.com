<head>

    <link rel="stylesheet" href="style.css">

<body class="bg-black">

    <div id="header-part"></div>

    <main class="auth-wrapper">
        <div id="signin-part"></div>
    </main>

    <div id="footer-part"></div>

    <script src="app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            Promise.all([
                loadPart('header-part', 'parts/header.html'),
                loadPart('signin-part', 'parts/signin-fragment.html'),
                loadPart('footer-part', 'parts/footer.html')
            ]);
        });

        document.querySelector('#login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    
    // Fake authentication for MVP testing
    console.log("Authorizing...");
    localStorage.setItem('gemstok_token', 'mock_token_12345');
    
    // Redirect to the profile page
    window.location.href = 'profile.html';
});
    </script>
